name: 'wrg-devguard'
description: 'Scan a repo for leaked secrets and prompt-policy violations'
author: 'yakuphanycl'

branding:
  icon: 'shield'
  color: 'red'

inputs:
  path:
    description: 'Root path to scan'
    required: false
    default: '.'
  profile:
    description: 'Policy profile: baseline or strict'
    required: false
    default: 'baseline'
  fail-on:
    description: 'Severity threshold to fail the job: warning or error'
    required: false
    default: 'error'
  json-out:
    description: 'Path for the JSON report artifact'
    required: false
    default: 'wrg-devguard-report.json'
  allowlist:
    description: 'Optional path to an allowlist JSON file'
    required: false
    default: ''
  python-version:
    description: 'Python version to use when installing wrg-devguard'
    required: false
    default: '3.11'
  version:
    description: 'wrg-devguard package version (pip spec). Empty = latest on PyPI.'
    required: false
    default: ''

outputs:
  report-path:
    description: 'Path to the JSON report file'
    value: ${{ inputs.json-out }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install wrg-devguard
      shell: bash
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          pip install "wrg-devguard${{ inputs.version }}"
        else
          pip install wrg-devguard
        fi

    - name: Run wrg-devguard check
      shell: bash
      run: |
        ARGS=(--path "${{ inputs.path }}" --profile "${{ inputs.profile }}" --fail-on "${{ inputs.fail-on }}" --json-out "${{ inputs.json-out }}")
        if [ -n "${{ inputs.allowlist }}" ]; then
          ARGS+=(--allowlist "${{ inputs.allowlist }}")
        fi
        wrg-devguard check "${ARGS[@]}"

    - name: Upload JSON report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: wrg-devguard-report
        path: ${{ inputs.json-out }}
